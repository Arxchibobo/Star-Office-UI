<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobo 的像素办公室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2d3561;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        #game-container {
            border: 4px solid #e94560;
            image-rendering: pixelated;
        }
        #status-text {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #eee;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 4px;
            max-width: 90%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="status-text">加载中...</div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            pixelArt: true,
            backgroundColor: '#2d3561',
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const STATES = {
            idle: { name: '待命', area: 'breakroom' },
            writing: { name: '整理文档', area: 'workdesk' },
            researching: { name: '搜索信息', area: 'workdesk' },
            executing: { name: '执行任务', area: 'workdesk' },
            syncing: { name: '同步备份', area: 'breakroom' },
            error: { name: '出错了', area: 'breakroom' }
        };

        const BUBBLE_TEXTS = {
            idle: ['摸鱼中…', '有没有新任务？', '咖啡真好喝', '伸个懒腰'],
            writing: ['这个要记下来', '写得手酸', '再检查一遍', '好记性不如烂笔头'],
            researching: ['让我搜一下', '找到线索了', '这个有意思', '再深挖一点'],
            executing: ['冲鸭！', '这个简单', '加油加油', '马上搞定'],
            syncing: ['备份备份', '安全第一', '同步中…', '云端见'],
            error: ['啊哦…', '出问题了', '让我看看', '马上修好']
        };

        let game, star, areas = {}, currentState = 'idle', statusText, lastFetch = 0, lastBlink = 0, lastBubble = 0, targetX = 660, targetY = 170, bubble = null, typewriterText = '', typewriterTarget = '', typewriterIndex = 0, lastTypewriter = 0;
        const FETCH_INTERVAL = 2000;
        const BLINK_INTERVAL = 2500;
        const BUBBLE_INTERVAL = 8000;
        const TYPEWRITER_DELAY = 50;

        function preload() {
            this.load.image('office_bg', '/static/office_bg_v2.png');
            this.load.image('lobster', '/static/lobster_bright_clean.png');
        }

        function create() {
            game = this;
            
            // 显示AI生成的精美办公室背景图
            this.add.image(400, 300, 'office_bg');
            
            // 根据新背景图调整区域坐标（800x600画布）
            areas = {
                workdesk: { x: 200, y: 280 },    // 办公桌区域（左侧）
                breakroom: { x: 500, y: 320 },   // 休息沙发区（中央）
                alert: { x: 400, y: 450 }        // 警告区（中下方）
            };
            
            // 可选：显示区域标记（调试用，生产环境可删除）
            const DEBUG_AREAS = false; // 改为true可看到区域标记
            if (DEBUG_AREAS) {
                Object.keys(areas).forEach(key => {
                    const area = areas[key];
                    const marker = game.add.circle(area.x, area.y, 30, 0xff0000, 0.3);
                    const label = game.add.text(area.x, area.y, key, {
                        font: '12px Arial',
                        fill: '#ffffff',
                        stroke: '#000000',
                        strokeThickness: 2
                    }).setOrigin(0.5);
                });
            }

            // 创建龙虾角色（鲜艳醒目，扩大两倍）
            star = game.physics.add.sprite(500, 320, 'lobster');
            star.setOrigin(0.5);
            star.setScale(0.20);
            star.setAlpha(0.95);
            
            // 添加阴影效果（存储为全局变量以便跟随龙虾移动）
            window.lobsterShadow = game.add.ellipse(500, 345, 120, 40, 0x000000, 0.3);
            window.lobsterShadow.setDepth(-1);

            // 改进的牌匾：Bobo的办公室
            // 背景（带渐变效果）
            const plaqueBg = game.add.rectangle(400, 570, 400, 45, 0x5d4037);
            plaqueBg.setStrokeStyle(4, 0x3e2723);
            
            // 内边框装饰
            const plaqueInner = game.add.rectangle(400, 570, 380, 35, 0x6d503f, 0);
            plaqueInner.setStrokeStyle(2, 0x8b6f47);
            
            // 文字（加发光效果）
            const plaqueText = game.add.text(400, 570, '⭐ Bobo的办公室 ⭐', {
                font: 'bold 20px monospace',
                fill: '#ffd700',
                stroke: '#ff8800',
                strokeThickness: 1,
                shadow: {
                    offsetX: 0,
                    offsetY: 0,
                    color: '#ffaa00',
                    blur: 8,
                    fill: true
                }
            }).setOrigin(0.5);
            
            // 添加环境光效粒子（轻微的光点漂浮）
            for (let i = 0; i < 8; i++) {
                const x = Phaser.Math.Between(50, 750);
                const y = Phaser.Math.Between(50, 500);
                const particle = game.add.circle(x, y, 2, 0xffffff, 0.3);
                
                // 轻微的上下浮动动画
                game.tweens.add({
                    targets: particle,
                    y: y + Phaser.Math.Between(-30, 30),
                    alpha: Phaser.Math.FloatBetween(0.1, 0.4),
                    duration: Phaser.Math.Between(3000, 5000),
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });
            }

            statusText = document.getElementById('status-text');
            fetchStatus();
        }

        function update(time) {
            if (time - lastFetch > FETCH_INTERVAL) { fetchStatus(); lastFetch = time; }

            // 眨眼（用透明度变化模拟）
            if (time - lastBlink > BLINK_INTERVAL) {
                star.setAlpha(0.3);
                lastBlink = time;
                setTimeout(() => { star.setAlpha(0.95); }, 150);
            }

            // 冒气泡
            if (time - lastBubble > BUBBLE_INTERVAL) {
                showBubble();
                lastBubble = time;
            }

            // 打字机效果
            if (typewriterIndex < typewriterTarget.length && time - lastTypewriter > TYPEWRITER_DELAY) {
                typewriterText += typewriterTarget[typewriterIndex];
                statusText.textContent = typewriterText;
                typewriterIndex++;
                lastTypewriter = time;
            }

            // 移动 + 小踱步
            moveStar(time);
        }

        function normalizeState(s) {
            if (!s) return 'idle';
            if (s === 'working') return 'writing';
            if (s === 'run' || s === 'running') return 'executing';
            if (s === 'sync') return 'syncing';
            if (s === 'research') return 'researching';
            return s;
        }

        function fetchStatus() {
            fetch('/status')
                .then(response => response.json())
                .then(data => {
                    const nextState = normalizeState(data.state);
                    const stateInfo = STATES[nextState] || STATES.idle;
                    const changed = nextState !== currentState;
                    currentState = nextState;
                    const nextLine = '[' + stateInfo.name + '] ' + (data.detail || '...');
                    if (changed) {
                        typewriterTarget = nextLine;
                        typewriterText = '';
                        typewriterIndex = 0;
                        const targetArea = areas[stateInfo.area] || areas.breakroom;
                        targetX = targetArea.x + (Math.random() - 0.5) * 40;
                        targetY = targetArea.y + (Math.random() - 0.5) * 40;
                    } else {
                        if (!typewriterTarget || typewriterTarget !== nextLine) {
                            typewriterTarget = nextLine;
                            typewriterText = '';
                            typewriterIndex = 0;
                        }
                    }
                })
                .catch(error => {
                    typewriterTarget = '连接失败，正在重试...';
                    typewriterText = '';
                    typewriterIndex = 0;
                });
        }

        function moveStar(time) {
            const stateInfo = STATES[currentState] || STATES.idle;
            const baseTarget = areas[stateInfo.area] || areas.breakroom;
            if (Math.random() < 0.005) {
                targetX = baseTarget.x + (Math.random() - 0.5) * 40;
                targetY = baseTarget.y + (Math.random() - 0.5) * 40;
            }
            const dx = targetX - star.x;
            const dy = targetY - star.y;
            const speed = 1.2;
            const wobble = Math.sin(time / 200) * 0.8;
            if (Math.abs(dx) > 3) star.x += Math.sign(dx) * speed;
            if (Math.abs(dy) > 3) star.y += Math.sign(dy) * speed;
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                star.setY(star.y + wobble);
            }
            
            // 让阴影跟随龙虾移动
            if (window.lobsterShadow) {
                window.lobsterShadow.x = star.x;
                window.lobsterShadow.y = star.y + 25; // 偏移到底部
            }
        }

        function showBubble() {
            if (bubble) { bubble.destroy(); bubble = null; }
            const texts = BUBBLE_TEXTS[currentState] || BUBBLE_TEXTS.idle;
            const text = texts[Math.floor(Math.random() * texts.length)];
            const bg = game.add.rectangle(star.x, star.y - 45, text.length * 10 + 20, 28, 0xffffff, 0.95);
            bg.setStrokeStyle(2, 0x000000);
            const txt = game.add.text(star.x, star.y - 45, text, { font: '12px monospace', fill: '#000', align: 'center' }).setOrigin(0.5);
            bubble = game.add.container(0, 0, [bg, txt]);
            bubble.setDepth(100);
            setTimeout(() => { if (bubble) { bubble.destroy(); bubble = null; } }, 3000);
        }

        new Phaser.Game(config);
    </script>
</body>
</html>
